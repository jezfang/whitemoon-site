{{ define "main" }}

<section class="booking-section">
  <div class="container">
    <span class="section-label">Booking</span>
    <h1>{{ .Title }}</h1>
    <p>{{ .Description }}</p>

    <div class="booking-circle">
      <form class="booking-form" id="booking-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-group">
          <label for="name">姓名</label>
          <input type="text" id="name" name="name" required placeholder="您的姓名">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label for="contact">聯絡方式</label>
          <input type="text" id="contact" name="contact" required placeholder="電話或 LINE ID">
        </div>
        <button type="submit" class="booking-submit">預約體驗</button>
      </form>
    </div>
  </div>
</section>

{{ end }}
