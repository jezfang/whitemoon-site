<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script>
window.addEventListener('load', () => {

  
  const toggle = document.getElementById('menu-toggle');
  const nav = document.getElementById('site-nav');
  if (toggle) {
    toggle.addEventListener('click', () => {
      toggle.classList.toggle('open');
      nav.classList.toggle('open');
    });
  }

  if (typeof gsap === 'undefined') return;

  
  
  
  function setupImageReveal(container, selector) {
    const frames = container.querySelectorAll(selector);
    frames.forEach(frame => {
      const img = frame.querySelector('img');
      if (!img) return;
      gsap.set(img, { filter: 'grayscale(1) brightness(0.2)', scale: 1.05 });
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const img = entry.target.querySelector('img');
        if (!img) return;
        gsap.to(img, { filter: 'grayscale(0) brightness(1)', duration: 4, ease: 'power2.out' });
        gsap.to(img, { scale: 1, duration: 5, ease: 'power3.out' });
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.05 });

    frames.forEach(frame => observer.observe(frame));
  }

  
  
  
  function setupTextReveal(container, selector) {
    const els = container.querySelectorAll(selector);
    els.forEach(el => { gsap.set(el, { opacity: 0, y: 30 }); });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        gsap.to(entry.target, { opacity: 1, y: 0, duration: 1.4, ease: 'power3.out' });
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.05 });

    els.forEach(el => observer.observe(el));
  }

  
  
  
  
  
  const viewer = document.getElementById('gallery-viewer');

  if (viewer) {
    const imgs = viewer.querySelectorAll('.gv-img');
    const slides = viewer.querySelectorAll('.gv-slide');
    const phasesContainer = document.getElementById('moon-phases');
    const vpL = document.getElementById('vp-circle-l');
    const vpR = document.getElementById('vp-circle-r');
    const total = imgs.length;
    let current = 0;
    let busy = false;
    let locked = true;

    
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'moon-phase' + (i === 0 ? ' active' : '');
      dot.dataset.index = i;
      dot.addEventListener('click', () => {
        if (i !== current && !busy) {
          showSlide(i, i > current ? 'forward' : 'backward');
        }
      });
      phasesContainer.appendChild(dot);
    }
    const dots = phasesContainer.querySelectorAll('.moon-phase');

    
    const isMobile = window.innerWidth <= 768;
    const swapDist = isMobile ? Math.round(window.innerWidth * 0.27) : 260;

    
    const photoInner = document.getElementById('gv-photos');
    const brand = document.getElementById('gv-brand');
    gsap.set(photoInner, { opacity: 0 });

    if (!sessionStorage.getItem('page-transition')) {
      
      gsap.to(brand, { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.2 });

      
      gsap.to(brand, { opacity: 0, duration: 0.4, ease: 'power1.in', delay: 1.0 });

      
      if (vpL && vpR) {
        gsap.to(vpL, { x: swapDist, duration: 1.5, ease: 'power2.inOut', delay: 1.4 });
        gsap.to(vpR, { x: -swapDist, duration: 1.5, ease: 'power2.inOut', delay: 1.4 });
      }

      
      gsap.to(photoInner, { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 2.9 });
    } else {
      gsap.set(photoInner, { opacity: 1 });
    }

    
    gsap.set(slides[0], { x: 0, opacity: 0 });
    gsap.to(slides[0], {
      opacity: 1, duration: 0.6, ease: 'power2.out',
      delay: sessionStorage.getItem('page-transition') ? 0.3 : 2.9
    });

    function showSlide(index, direction) {
      if (index === current || busy) return;
      busy = true;
      const prev = current;
      current = index;
      const fwd = direction === 'forward';

      
      gsap.to(imgs[prev], { opacity: 0, duration: 0.6, ease: 'power1.inOut' });
      imgs[prev].classList.remove('active');
      imgs[index].classList.add('active');

      
      const swapSpeed = isMobile ? 1.0 : 1.2;
      if (vpL && vpR) {
        const lx = Math.round(parseFloat(gsap.getProperty(vpL, 'x')) || 0);
        const rx = Math.round(parseFloat(gsap.getProperty(vpR, 'x')) || 0);
        gsap.to(vpL, { x: Math.abs(lx) < 2 ? swapDist : 0, duration: swapSpeed, ease: 'sine.inOut' });
        gsap.to(vpR, { x: Math.abs(rx) < 2 ? -swapDist : 0, duration: swapSpeed, ease: 'sine.inOut' });
      }

      
      const appearDelay = isMobile ? 0.5 : 0.7;
      gsap.set(imgs[index], { opacity: 0 });
      gsap.to(imgs[index], { opacity: 1, duration: 1.2, ease: 'sine.out', delay: appearDelay });

      
      gsap.to(slides[prev], {
        x: fwd ? -60 : 60, opacity: 0, duration: 0.5, ease: 'sine.in',
        onComplete: () => { slides[prev].classList.remove('active'); }
      });

      gsap.set(slides[index], { x: fwd ? 30 : -30, opacity: 0 });
      slides[index].classList.add('active');
      gsap.to(slides[index], {
        x: 0, opacity: 1, duration: 1.2, ease: 'sine.out', delay: appearDelay,
        onComplete: () => { busy = false; }
      });

      
      dots.forEach((d, i) => {
        d.classList.remove('active', 'passed');
        if (i === current) d.classList.add('active');
        else if (i < current) d.classList.add('passed');
      });
    }

    
    function forceShowCurrent() {
      slides.forEach(s => {
        gsap.set(s, { x: 0, opacity: 0 });
        s.classList.remove('active');
      });
      gsap.set(slides[current], { x: 0, opacity: 1 });
      slides[current].classList.add('active');
      busy = false;
    }

    
    let gestureTimer = null;
    let gestureTriggered = false;

    window.addEventListener('wheel', (e) => {
      
      clearTimeout(gestureTimer);
      gestureTimer = setTimeout(() => { gestureTriggered = false; }, 400);

      if (!locked) {
        if (window.scrollY <= 5 && e.deltaY < 0) {
          e.preventDefault();
          locked = true;
          viewer.style.touchAction = 'none';
          window.scrollTo({ top: 0 });
          forceShowCurrent();
          gestureTriggered = true;
        }
        return;
      }

      e.preventDefault();
      if (busy || gestureTriggered) return;
      gestureTriggered = true;

      if (e.deltaY > 0) {
        if (current < total - 1) {
          showSlide(current + 1, 'forward');
        } else {
          locked = false;
          window.scrollTo({ top: viewer.offsetHeight, behavior: 'smooth' });
        }
      } else if (e.deltaY < 0) {
        if (current > 0) showSlide(current - 1, 'backward');
      }
    }, { passive: false });

    
    let touchStartY = 0;
    viewer.style.touchAction = 'none';

    viewer.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });

    viewer.addEventListener('touchmove', (e) => {
      if (locked) e.preventDefault();
    }, { passive: false });

    viewer.addEventListener('touchend', (e) => {
      if (!locked || busy) return;
      const diff = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(diff) > 50) {
        if (diff > 0) {
          if (current < total - 1) {
            showSlide(current + 1, 'forward');
          } else {
            
            locked = false;
            viewer.style.touchAction = 'auto';
            window.scrollTo({ top: viewer.offsetHeight, behavior: 'smooth' });
          }
        } else {
          if (current > 0) showSlide(current - 1, 'backward');
        }
      }
    }, { passive: true });

    
    let pageTouchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      if (locked) return;
      pageTouchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (locked) return;
      const diff = pageTouchStartY - e.changedTouches[0].clientY;
      
      if (diff < -50 && window.scrollY <= 5) {
        locked = true;
        viewer.style.touchAction = 'none';
        window.scrollTo({ top: 0 });
        forceShowCurrent();
      }
    }, { passive: true });

    
    document.addEventListener('keydown', (e) => {
      if (!locked || busy) return;
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
        if (current < total - 1) showSlide(current + 1, 'forward');
      } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
        if (current > 0) showSlide(current - 1, 'backward');
      }
    });
  }

  
  
  
  if (!viewer) {
    setupImageReveal(document, '.card-image, .single-cover, .about-image');
    setupTextReveal(document,
      '.section-label, .section-title, .single-header h1, .single-meta, ' +
      '.about-text h1, .about-text p, ' +
      '.card-title, .card-meta, .card-excerpt, .testimonial-card'
    );
  }

  
  
  
  
  
  const cover = document.getElementById('page-transition-cover');

  if (sessionStorage.getItem('page-transition')) {
    sessionStorage.removeItem('page-transition');
    
    gsap.set(cover, { x: '0%' });
    gsap.to(cover, { x: '-100%', duration: 0.8, ease: 'power3.inOut', delay: 0.1 });
  }

  document.querySelectorAll('a[href]').forEach(link => {
    const href = link.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('mailto') || link.getAttribute('target') === '_blank') return;
    link.addEventListener('click', (e) => {
      e.preventDefault();
      if (nav) nav.classList.remove('open');
      if (toggle) toggle.classList.remove('open');
      sessionStorage.setItem('page-transition', '1');
      
      gsap.set(cover, { x: '100%' });
      gsap.to(cover, {
        x: '0%', duration: 0.6, ease: 'power3.inOut',
        onComplete: () => { window.location.href = href; }
      });
    });
  });

});
</script>
